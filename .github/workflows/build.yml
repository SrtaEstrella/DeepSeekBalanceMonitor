name: Build

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ["v[0-9]*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: pip install cryptography

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      actions: read
      contents: write
      id-token: write
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORG_ID: ${{ vars.SIGNPATH_ORG_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pystray Pillow cryptography pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --noconsole `
            --name DeepSeekBalanceMonitor `
            --icon assets/app.ico `
            --paths src `
            --add-data "assets/app.ico`;." `
            --version-file scripts/version_info.txt `
            --clean `
            --log-level INFO `
            main.py

      - name: Upload unsigned artifact
        id: upload-unsigned
        if: ${{ env.SIGNPATH_API_TOKEN != '' && env.SIGNPATH_ORG_ID != '' && env.SIGNPATH_PROJECT_SLUG != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-exe
          path: dist/DeepSeekBalanceMonitor.exe

      - name: Sign Windows executable
        id: sign
        if: ${{ env.SIGNPATH_API_TOKEN != '' && env.SIGNPATH_ORG_ID != '' && env.SIGNPATH_PROJECT_SLUG != '' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORG_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: 'release'
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist-signed

      - name: Prepare release file
        shell: pwsh
        run: |
          $signedFile = Get-ChildItem "dist-signed" -Filter "DeepSeekBalanceMonitor.exe" -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($signedFile) {
            Copy-Item $signedFile.FullName "dist/DeepSeekBalanceMonitor.exe" -Force
            Write-Host "Using signed executable"
          } else {
            Write-Host "Using unsigned executable"
          }

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:GITHUB_REF_NAME dist/DeepSeekBalanceMonitor.exe --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $env:GITHUB_REF_NAME dist/DeepSeekBalanceMonitor.exe --title $env:GITHUB_REF_NAME --notes "Python build." --repo $env:GITHUB_REPOSITORY
          }
