name: Build

on:
  push:
    tags: ["v[0-9]*"]

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pystray Pillow pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --noconsole `
            --name DeepSeekBalanceMonitor `
            --icon app.ico `
            --paths src `
            --add-data "app.ico;." `
            --version-file version_info.txt `
            --clean `
            main.py

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" > $null 2>&1
          if ($?) {
            gh release upload "${{ github.ref_name }}" dist/DeepSeekBalanceMonitor.exe --clobber --repo "${{ github.repository }}"
          } else {
            gh release create "${{ github.ref_name }}" dist/DeepSeekBalanceMonitor.exe --title "v${{ github.ref_name }}" --notes "Python build." --repo "${{ github.repository }}"
          }
